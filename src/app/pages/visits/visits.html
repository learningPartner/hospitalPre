<div class="container-fluid">
  <div class="row">
    <div class="col-8">
      <div class="card border-primary">
        <div class="card-header bg-primary text-dark">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Visit List</h5>
            <button class="btn btn-dark btn-sm">Add Visit</button>
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Sr No</th>
                  <th>Patient ID</th>
                  <th>Doctor ID</th>
                  <th>Visit Date</th>
                  <th>Symptoms</th>
                  <th>Diagnosis</th>
                  <th width="150">Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>101</td>
                  <td>201</td>
                  <td>2026-07-11</td>
                  <td>Fever, Cough</td>
                  <td>Viral Infection</td>
                  <td>
                    <button class="btn btn-sm btn-success">Edit</button>
                    <button class="btn btn-sm btn-danger mx-2">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-4">
      <div class="card border-primary">
        <div class="card-header bg-primary text-dark">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Visit Details</h5>
            <button class="btn btn-dark btn-sm">Close</button>
          </div>
        </div>
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Patient ID</label>
              <select class="form-select">
                <option value="">Select Patient</option>
                <!-- @for (item of patientList(); track $index) {
                  <option [value]="item.patientId"> {{item.fullName}} -{{item.phone}}</option>
                } -->

                @for (item of patientList$ | async; track $index) {
                  <option [value]="item.patientId"> {{item.fullName}} -{{item.phone}}</option>
                }
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Doctor ID</label>
               <select class="form-select">
              <option value="">Select Doctor</option>
                 @for (item of doctorList$ | async; track $index) {
                  <option [value]="item.id"> {{item.fullName}} -{{item.mobileNo}}</option>
                }
                </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Visit Date</label>
              <input type="datetime-local" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Symptoms</label>
              <textarea class="form-control" rows="3" placeholder="Enter symptoms"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Diagnosis</label>
              <textarea class="form-control" rows="3" placeholder="Enter diagnosis"></textarea>
            </div>

            <div class="d-flex justify-content-end gap-2">
              <button type="reset" class="btn btn-secondary">Reset</button>
              <button type="button" class="btn btn-warning">Save Visit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
