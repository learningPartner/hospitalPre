<div class="container-fluid ">
    <div class="row">

        <!-- Table Section -->
        <div [class]="isFormOpen ? 'col-lg-8':'col-lg-12'">
            <div class="row">
                <div class="col-3 offset-md-7">
                    <select #searchTem class="form-select">
                         <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Doctor">Doctor</option>
                        <option value="Eeceptionist">Eeceptionist</option>
                    </select>
                </div>
                <div class="col-2 text-end">
                    <button class="btn btn-sm btn-primary" (click)="onSearch()">Search</button>
                    <button class="btn btn-sm btn-secondary" (click)="onReset()">Reset</button>
                </div>
            </div>
            <div class="card border-primary">
                <div class="card-header bg-primary text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">User List</h5>

                        <button class="btn btn-dark btn-sm" (click)="toggleFormVisibility()">
                            <i class="bi bi-plus-circle"></i> Add User
                        </button>
                    </div>
                </div>

                <div class="card-body">

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">

                            <thead class="table-light">
                                <tr>
                                    <th>Sr No</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Mobile No</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th width="150">Action</th>
                                </tr>
                            </thead>

                            <tbody>
                                @for (item of userList(); track $index) {
                                <tr>
                                    <td>{{$index+1}} </td>
                                    <td> {{item.fullName}} </td>
                                    <td> {{item.email}} </td>
                                    <td> {{item.mobileNo}} </td>
                                    <td> {{item.roleName}} </td>
                                    <td> {{item.isActive ? 'Active':'De-Active'}} </td>
                                    <td width="150">
                                        <button class="btn btn-sm btn-success">Edit</button>
                                        <button class="btn btn-sm btn-danger mx-2">Delete</button>
                                    </td>

                                </tr>
                                }

                            </tbody>

                        </table>
                    </div>

                </div>
            </div>

        </div>

        @if (isFormOpen == true) {
        <div class="col-lg-4">

            <div class="card border-primary">

                <div class="card-header bg-primary text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">User Details</h5>

                        <button class="btn btn-dark btn-sm" (click)="toggleFormVisibility()">
                            <i class="bi bi-x-circle"></i> Close
                        </button>
                    </div>
                </div>

                <div class="card-body">

                    <form [formGroup]="userForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter Full Name"
                                    formControlName="fullName">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Enter Email"
                                    formControlName="email">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Mobile No</label>
                                <input type="text" class="form-control" placeholder="Enter Mobile No"
                                    formControlName="mobileNo">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Enter Password"
                                    formControlName="password">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Role</label>
                                <select class="form-select" formControlName="roleName">
                                    <option selected>Select Role</option>
                                    <option>Admin</option>
                                    <option>User</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label d-block">Status</label>

                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" formControlName="isActive">
                                    <label class="form-check-label">
                                        Active
                                    </label>
                                </div>
                            </div>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="reset" class="btn btn-secondary">
                                Reset
                            </button>

                            <button type="button" (click)="onSaveUser()" class="btn btn-warning">
                                Save User
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
        }


    </div>

</div>
