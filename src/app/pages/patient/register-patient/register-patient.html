<div class="register-wrapper">
    @if (showBanner) {
        <div class="banner">
    <div class="brand-block">
      <div class="brand-icon">✚</div>
      <div>
        <h1>CityCare Hospital</h1>
        <p>Compassionate care, every step of the way.</p>
      </div>
    </div>

    <div class="banner-text">
      <h2>Register Yourself</h2>
      <p>Make an Appointment</p>
    </div>
  </div>
    }
  

  <div class="form-card">
    <h3>Patient Registration</h3>
    <p class="subtitle">Please fill in your details to get started.</p>

    <form class="register-form">
      <div class="form-row">
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" [(ngModel)]="newPatientObj.fullName" type="text" placeholder="Enter your full name" />
      </div>

      <div class="form-row">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" [(ngModel)]="newPatientObj.gender">
          <option value="">Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-row">
        <label for="dateOfBirth">Date of Birth</label>
        <input id="dateOfBirth" name="dateOfBirth" [(ngModel)]="newPatientObj.dateOfBirth" type="date" />
      </div>

      <div class="form-row">
        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" [(ngModel)]="newPatientObj.phone" type="tel" placeholder="Enter your phone number" />
      </div>

      <div class="form-row">
        <label for="address">Address</label>
        <textarea id="address" name="address" [(ngModel)]="newPatientObj.address" rows="3" placeholder="Enter your address"></textarea>
      </div>

      <button type="button" (click)="onRegister()">Register</button>
    </form>
  </div>
</div>
