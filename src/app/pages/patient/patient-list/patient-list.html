<div class="container-fluid">
    <div class="row">
        <div class="col-lg-8"> 

            <div class="card border-primary mt-2">
                <div class="card-header bg-primary text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Patient List</h5>
                        <button class="btn btn-dark btn-sm">
                            <i class="bi bi-plus-circle"></i> Add Medicine
                        </button>
                    </div>
                </div>

                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Sr No</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Gender</th>
                                    <th>Address</th>
                                    <th width="150">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                @for (item of patinetList(); track $index) {
                                     <tr>
                                    <td>{{$index}}</td>
                                    <td>{{item.fullName}}</td>
                                    <td>{{item.phone}}</td>
                                    <td>{{item.gender}}</td>
                                     <td>{{item.address}}</td>
                                    <td>
                                        <button class="btn btn-sm btn-success">Edit</button>
                                        <button class="btn btn-sm btn-danger mx-2">Delete</button>
                                    </td>
                                </tr>
                                }
                               
                                
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-primary">
                <div class="card-header bg-primary text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Medicine Details</h5>
                        <button class="btn btn-dark btn-sm">
                            <i class="bi bi-x-circle"></i> Close
                        </button>
                    </div>
                </div>

                <div class="card-body">
                    <app-register-patient [showBanner]="false"></app-register-patient>
                </div>
            </div>
        </div>
    </div>
</div>
